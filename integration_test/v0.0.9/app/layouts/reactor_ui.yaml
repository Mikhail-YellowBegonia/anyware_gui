globals:
  layout_mode: false
  focus_scope: main
  palette:
    bg_hex: "#fdf6f0"
    default_hex: "#586e75"
    special_hex: "#78cd26"

styles:
  default:
    color: Solar_Default
    text_color: Solar_Default
    line_color: Solar_Default
    thickness: 1
  panel:
    color: Solar_Default
    line_color: Solar_Default
    thickness: 2
  nav_button:
    color: Solar_Default
    label_align_h: center
    label_align_v: center
  nav_button_active:
    color: Solar_Special
    label_align_h: center
    label_align_v: center
  btn:
    color: Solar_Default
    label_align_h: center
    label_align_v: center
  btn_active:
    color: Solar_Special
    label_align_h: center
    label_align_v: center

pages:
  status:
    focus_scope: main
    groups:
      - id: nav
        rect: [0, 0, 128, 4]
        elements:
          - id: nav_frame
            type: rect
            rect: [0, 0, 128, 4]
            style: default
          - id: nav_status
            type: button
            rect: [1, 0.7, 14, 2.4]
            label: "状态"
            style: nav_button_active
            on_click: go_page.status
          - id: nav_diagram
            type: button
            rect: [16, 0.7, 14, 2.4]
            label: "趋势"
            style: nav_button
            on_click: go_page.diagram
          - id: nav_control
            type: button
            rect: [31, 0.7, 14, 2.4]
            label: "控制"
            style: nav_button
            on_click: go_page.control
          - id: nav_core
            type: button
            rect: [46, 0.7, 14, 2.4]
            label: "故障"
            style: nav_button
            on_click: go_page.core
          - id: nav_title
            type: text
            rect: [62, 1, 34, 2]
            text: "Reactor Prototype v0.0.9"
            align_h: left
            align_v: center
          - id: comms_indicator
            type: rect
            rect: [97, 1, 10, 2]
            style: default
            bind_style:
              color: net.comms_color
              line_color: net.comms_color
              filled: net.comms_on
          - id: comms_text
            type: text
            rect: [97, 1, 10, 2]
            text: "COMMS"
            align_h: center
            align_v: center
          - id: net_info_text
            type: text
            rect: [108, 1, 19, 2]
            bind: net.info
            text: "PORT --\nLAT --"
            align_h: left
            align_v: center
            line_step: 1

      - id: body
        rect: [0, 4, 128, 41]
        elements:
          - id: panel_frame
            type: rect
            rect: [0, 0, 128, 41]
            style: panel

          - id: status_metrics_box
            type: rect
            rect: [1, 1, 41, 20]
            style: default
          - id: status_metrics_text
            type: text
            rect: [2, 2, 39, 18]
            bind: status.metrics_block
            text: "--"
            align_h: left
            align_v: top
            line_step: 1

          - id: status_mission_box
            type: rect
